<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatholicApp - Super App Católico</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f8f5f0;
      color: #2c3e50;
    }
    .box {
      max-width: 780px;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #e8e0d8;
      background: white;
    }
    h1 { margin-top: 0; }
    code {
      background: #f1efea;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>CatholicApp</h1>
    <p>
      Este arquivo foi preparado como entrada web customizada para o deploy no Render em serviço único.
    </p>
    <p>
      Para usar exatamente o layout completo que você enviou no chat, substitua o conteúdo deste arquivo por ele:
      <code>web/index.html</code>.
    </p>
  </div>
</body>
</html>
